<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart | Blueprint Bryan Johnson</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/blueprint.bryanjohnson.com/cdn/shop/files/logo__favicon__new-day-bg-navy-b__q_ee0e70103c21.png">
    <link rel="stylesheet" href="/blueprint.bryanjohnson.com/cdn/shop/t/445/assets/cart-local-mock.css">
  </head>
  <body class="local-cart-body local-cart-page-body">
    <main class="local-cart-shell">
      <header class="local-cart-topbar local-cart-surface">
        <a class="local-cart-brand" href="/blueprint.bryanjohnson.com/index.html">
          <img src="/blueprint.bryanjohnson.com/cdn/shop/files/Logo_Blueprint_Bryan_Johnson_Stacked__q_4a911b96bf08.svg" alt="Blueprint Bryan Johnson">
          <span class="local-cart-brand-copy">
            <span class="local-cart-brand-label">Local mirror</span>
            <span class="local-cart-brand-title">Mock cart backend</span>
          </span>
        </a>
        <nav class="local-cart-nav" aria-label="Cart sandbox navigation">
          <a href="/blueprint.bryanjohnson.com/index.html">Home</a>
          <a href="/blueprint.bryanjohnson.com/collections/all-products.html">Shop all</a>
          <a href="/blueprint.bryanjohnson.com/account.html">Account</a>
          <a href="/blueprint.bryanjohnson.com/cart.html" aria-current="page">Cart</a>
        </nav>
      </header>

      <section class="local-cart-hero">
        <p class="local-cart-hero-kicker">Shopping cart preview</p>
        <h1>Local cart sandbox</h1>
        <p>Preview a cart-like experience locally without Shopify checkout or Rebuy smart cart dependencies.</p>
        <div class="local-cart-pill-row">
          <span class="local-cart-pill">Persistence: localStorage</span>
          <span class="local-cart-pill">Cart APIs: mocked</span>
          <span class="local-cart-pill">Checkout: disabled</span>
        </div>
      </section>

      <section class="local-cart-page-root" data-local-cart-page></section>
    </main>

    <script src="/blueprint.bryanjohnson.com/cdn/shop/t/445/assets/cart-local-mock.js" defer></script>
